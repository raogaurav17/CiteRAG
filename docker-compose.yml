services:
  postgres:
    image: postgres:16-alpine
    container_name: citerag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-citerag}
      POSTGRES_USER: ${POSTGRES_USER:-citerag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citerag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citerag} -d ${POSTGRES_DB:-citerag}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: